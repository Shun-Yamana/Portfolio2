AWSTemplateFormatVersion: '2010-09-09'
Description: 'DynamoDB ShogiGames Table for game state management'

Resources:
  # =========================
  # DynamoDB Table
  # =========================
  ShogiGamesTable:
    Type: AWS::DynamoDB::Table
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      TableName: ShogiGames
      BillingMode: PROVISIONED
      TableClass: STANDARD

      ProvisionedThroughput:
        ReadCapacityUnits: 1
        WriteCapacityUnits: 1

      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true

      AttributeDefinitions:
        - AttributeName: game_id
          AttributeType: S

      KeySchema:
        - AttributeName: game_id
          KeyType: HASH

      Tags:
        - Key: Project
          Value: ShogiApp
        - Key: Environment
          Value: Personal

  # =========================
  # IAM Role for Auto Scaling
  # =========================
  DynamoDBAutoScalingRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: application-autoscaling.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: DynamoDBAutoScalingPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - dynamodb:DescribeTable
                  - dynamodb:UpdateTable
                  - cloudwatch:PutMetricAlarm
                  - cloudwatch:DescribeAlarms
                  - cloudwatch:GetMetricStatistics
                  - cloudwatch:SetAlarmState
                  - cloudwatch:DeleteAlarms
                Resource: '*'

  # =========================
  # Table Write Auto Scaling
  # =========================
  TableWriteScalableTarget:
    Type: AWS::ApplicationAutoScaling::ScalableTarget
    Properties:
      MinCapacity: 1
      MaxCapacity: 5
      ResourceId: !Sub table/${ShogiGamesTable}
      RoleARN: !GetAtt DynamoDBAutoScalingRole.Arn
      ScalableDimension: dynamodb:table:WriteCapacityUnits
      ServiceNamespace: dynamodb

  TableWriteScalingPolicy:
    Type: AWS::ApplicationAutoScaling::ScalingPolicy
    Properties:
      PolicyName: ShogiGamesTableWriteScaling
      PolicyType: TargetTrackingScaling
      ScalingTargetId: !Ref TableWriteScalableTarget
      TargetTrackingScalingPolicyConfiguration:
        TargetValue: 70.0
        ScaleOutCooldown: 300
        ScaleInCooldown: 300
        DisableScaleIn: false
        PredefinedMetricSpecification:
          PredefinedMetricType: DynamoDBWriteCapacityUtilization

  # =========================
  # Table Read Auto Scaling
  # =========================
  TableReadScalableTarget:
    Type: AWS::ApplicationAutoScaling::ScalableTarget
    Properties:
      MinCapacity: 1
      MaxCapacity: 5
      ResourceId: !Sub table/${ShogiGamesTable}
      RoleARN: !GetAtt DynamoDBAutoScalingRole.Arn
      ScalableDimension: dynamodb:table:ReadCapacityUnits
      ServiceNamespace: dynamodb

  TableReadScalingPolicy:
    Type: AWS::ApplicationAutoScaling::ScalingPolicy
    Properties:
      PolicyName: ShogiGamesTableReadScaling
      PolicyType: TargetTrackingScaling
      ScalingTargetId: !Ref TableReadScalableTarget
      TargetTrackingScalingPolicyConfiguration:
        TargetValue: 70.0
        ScaleOutCooldown: 300
        ScaleInCooldown: 300
        DisableScaleIn: false
        PredefinedMetricSpecification:
          PredefinedMetricType: DynamoDBReadCapacityUtilization

Outputs:
  TableName:
    Description: DynamoDB Table Name
    Value: !Ref ShogiGamesTable
    Export:
      Name: ShogiGamesTableName

  TableArn:
    Description: DynamoDB Table ARN
    Value: !GetAtt ShogiGamesTable.Arn
    Export:
      Name: ShogiGamesTableArn

